# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on
# ... but without copy mode dragging
unbind -n MouseDrag1Pane
unbind -Tcopy-mode MouseDrag1Pane

# If running inside tmux ($TMUX is set), then change the status line to red
%if #{TMUX}
set -g status-bg red
%endif

set -g exit-empty yes
set -g focus-events on

# Enable title overrides
set -g set-titles on

# Define what the title should look like
# #T is the title of the active pane (usually the command running)
# #W is the window name
# #S is the session name
# set -g set-titles-string "#T"
set -g set-titles-string "#T / #W"
